<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c14" />
    <title>HOHOBOT · Liquid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/glass.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <canvas id="space-canvas" class="space-canvas"></canvas>
      <div class="aurora aurora-a"></div>
      <div class="aurora aurora-b"></div>
      <div class="grain"></div>
    </div>

    <div id="stage" class="stage">
      <header class="chrome glass-dock">
        <div class="traffic" aria-hidden="true">
          <span class="dot dot-close"></span>
          <span class="dot dot-min"></span>
          <span class="dot dot-max"></span>
        </div>
        <div class="brand">
          <span class="glyph">◇</span>
          <div class="titles">
            <h1>HOHOBOT</h1>
            <p class="tag">Local-first · Liquid glass</p>
          </div>
        </div>
        <div class="status-pill" id="engine-pill" role="status">
          <span class="pulse"></span>
          <span id="engine-label">Checking…</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel glass spatial" id="spatial-panel" aria-label="Spatial field">
          <div class="panel-head">
            <h2>Native field</h2>
            <p class="hint">Tilt follows pointer · depth preserved</p>
          </div>
          <div class="orbit-wrap">
            <div class="orbit-ring ring-1"></div>
            <div class="orbit-ring ring-2"></div>
            <div class="orbit-core" id="orbit-core">
              <span class="core-label">Ask</span>
            </div>
          </div>
          <div class="metrics" id="metrics">
            <div class="metric glass-inset">
              <span class="k">Latency</span>
              <span class="v" id="m-lat">—</span>
            </div>
            <div class="metric glass-inset">
              <span class="k">Model</span>
              <span class="v mono" id="m-model">—</span>
            </div>
          </div>
        </section>

        <section class="panel glass chat-panel">
          <div class="panel-head">
            <h2>Conversation</h2>
            <div class="toolbar">
              <label class="sr-only" for="agent">Agent</label>
              <select id="agent" class="glass-select" title="Agent">
                <option value="orchestrator">Orchestrator</option>
                <option value="simple">Simple</option>
              </select>
            </div>
          </div>
          <div id="thread" class="thread" role="log"></div>
          <form id="composer" class="composer glass-inset" autocomplete="off">
            <textarea
              id="input"
              rows="1"
              placeholder="Message… try calc: 12*11 or search: topic"
              spellcheck="false"
            ></textarea>
            <button type="submit" class="send glass-button">
              <span>Send</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M5 12h12M13 6l6 6-6 6"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </form>
        </section>
      </main>

      <footer class="foot glass-dock subtle">
        <span class="mono">GET /health</span>
        <span class="sep">·</span>
        <span class="mono">POST /v1/chat/completions</span>
        <span class="sep">·</span>
        <span id="foot-tip">Same origin UI</span>
      </footer>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
